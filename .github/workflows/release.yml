name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write  # for PyPI trusted publishing

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify distribution
        run: twine check dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    # Requires a PyPI Trusted Publisher configured at pypi.org

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          python - <<'EOF'
          import re, os, sys
          version = os.environ["GITHUB_REF_NAME"].lstrip("v")
          text = open("CHANGELOG.md").read()
          # Find the section for this version
          pattern = rf"## \[{re.escape(version)}\].*?(?=\n## \[|\Z)"
          m = re.search(pattern, text, re.DOTALL)
          body = m.group(0).strip() if m else f"Release {version}"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("body<<CHANGELOG_EOF\n")
              f.write(body + "\n")
              f.write("CHANGELOG_EOF\n")
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PyJolt ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.body }}
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}
