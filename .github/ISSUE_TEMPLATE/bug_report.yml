name: Bug Report
description: Report a bug in PyJolt
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code to reproduce the issue.
      render: python
      placeholder: |
        from pyjolt.transforms import Shift

        spec = {...}
        data = {...}
        result = Shift(spec).apply(data)
        # Expected: ...
        # Got: ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: PyJolt version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true
